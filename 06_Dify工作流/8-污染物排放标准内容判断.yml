      \ </p> <p> ② 存放涉油类原料暂存区、存放危险废物的危废仓应以混凝土硬化地面作为基础，并做好防腐防渗等措施。 </p> <p> ③ 存放涉油类原料暂存区、存放危险废物的危废仓应设置围堰、墁坡、托盘或导流沟等，同时危废仓附近，应放置吸收棉、应急泵、吨桶等应急救援物资，确保发生泄漏事故后能将泄漏液体拦截在危废仓内，并能及时通过吸收棉、应急泵转移至吨桶内，减少机油等风险物质下渗的时间。\
      \ </p> <p> ④ 车间内应设置足量的移动式干粉灭火器，并设置消防沙箱，厂区出入口可设置 10cm-15cm 高的墁坡，拦截消防废水流出厂区。同时，厂区雨水井设置截止阀，当发生火灾时，通过及时关闭雨水截止阀，避免消防废水通过雨水井流出厂区外，对周边的水环境造成影响。\
      \ </p> <p> ⑤ 厂房内粘贴告示：禁止吸烟、禁用明火，物料储存区域附近应注意防火等。 </p> <p> ⑥ 车间应安排专人管理，做好入库记录，并定期检查材料存储的安全状态，定期检查其包装有无破损，以防止泄漏。\
      \ </p> <p> ⑦ 储存辅助材料的桶上应注明物质的名称、危险特性、安全使用说明以及事故应对措施等内容。 </p> <p> ⑧ 加强对废气治理设施日常巡检、定期对设备进行维修、保养等。\
