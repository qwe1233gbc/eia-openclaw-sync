            \n筛选文本：\n{{#context#}}\n\n请输出一个JSON对象，包含所有产污源，字段为：\n{\n  \"产污源列表\": [\n\
            \    {\n      \"产污环节\": \"如注塑、焊接、涂装等\",\n      \"主要污染物\": \"如非甲烷总烃、颗粒物、COD等\"\
            ,\n      \"产污系数来源\": \"手册名称/类比项目/物料衡算等\",\n      \"产污系数取值\": \"数值+单位（如\
