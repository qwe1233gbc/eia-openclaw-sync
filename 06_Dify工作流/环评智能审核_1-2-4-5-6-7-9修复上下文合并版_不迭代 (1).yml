          \            in_str = not in_str\n            continue\n\n        if in_str:\n\
          \            continue\n\n        if ch in \"{[\":\n            stack.append(ch)\n\
          \n        elif ch in \"}]\":\n            if stack:\n                top\
          \ = stack[-1]\n                if (top == \"{\" and ch == \"}\") or (top\
          \ == \"[\" and ch == \"]\"):\n                    stack.pop()\n\n    closing\
