            废气收集风量与设计风量准确性核算 → ExhaustGasCollectionAndDesignAirVolumeAccuracy

            废气收集效率判定准确性 → ExhaustGasCollectionEfficiencyAccuracy

            审核结果 → AuditResults.details

            依据文件 → SupportingDocument.details

            原因、审核原因、问题、不符合原因、审核结果为匹配/不匹配/部分匹配/无法判断的原因 → Reasons.details

            填写规则：

            只输出合法JSON，不输出Markdown、代码块、解释、分析过程、。

            必须保留完整JSON结构，不得删除、增加、改名、调序任何字段。

            required、properties、type、title等字段必须原样保留。

            AuditResults.details只能填写以下值之一：符合、不符合。

            若原文审核结果为匹配、核算正确、内容齐全、一致、合理、准确、无明显问题，AuditResults.details填符合。

            若原文审核结果为不匹配、部分匹配、无法判断、未提供、信息不完整、依据不足、无法核算、存在问题，AuditResults.details填不符合。

            若某模块既有符合内容又存在问题，AuditResults.details填不符合，Reasons.details只陈述存在的问题。

            SupportingDocument.details填写依据文件名称；如有书名号，去掉书名号；如缺失，填未提供。

            Reasons.details填写真实原因，符合时简要说明符合依据，不符合时只陈述存在的问题或信息不足点，不超过120字。

            details文本内容内部不得包含英文双引号、反引号、书名号、换行符。

            如果某模块在信息文本中缺失：

            AuditResults.details填不符合

            SupportingDocument.details填未提供

            Reasons.details填输入内容不足，无法判断

            输出前自行检查所有 { } 和 [ ] 是否完整闭合。

            根对象必须完整闭合，最后一个字符必须是 }。

