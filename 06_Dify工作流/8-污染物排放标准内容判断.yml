      \ 工艺流程和产排污 </p> <p> 环节 </p> </td> <td> <p> 1 、工艺流程 </p> <p> 项目生产工艺包括 ① 塑料制品制造\
      \ 、②注塑模具维修 ，见图 2-3 及图 2-4 。 </p> <p> （ 1 ）塑料制品制造 </p>  <p> 图 2-3 塑料制品制造生产工艺流程图\
      \ </p> <p> 生产工艺流程说明： </p> <p> ① 烘料：注塑前需将受潮的 PBT 、 PP 、 PA6 塑料粒烘干水分，使用电加热，烘干温度控制在\
      \ 80-100℃ 左右，此过程温度不高，塑料不会受热熔融，基本不会产生有机废气，该过程主要产生废包装物。 </p> <p> ② 混料：将烘干的 PBT\
      \ 、 PP 、 PA6 塑料粒、色粉按照比例投入混料机混合均匀，投入混料过程粉状原料（色粉）会产生粉尘，粒状原料基本不产生粉尘。 混料机工作过程为密闭式，混料过程基本不产生粉尘，因此该过程主要\
      \ 产生粉尘（颗粒物） 。 </p> <p> ③ 注塑：将混合均匀后的原辅材料通过气力输送方式密闭投加至注塑机，注塑成型。 PBT 、 PP 、 PA6\
      \ 塑料的注塑温度分别控制在 2 4 0℃ 左右、 170℃ 左右、 250℃ 左右，然后控制注射的压力和速度将塑料注入模具，产品成型需用水进行间接冷却。项目使用的\
      \ PBT 塑料、 PP 塑料 、 PA6 塑料 分解温度分别为＞ 280℃ 、＞ 340℃ 、＞ 300℃ ，具有良好的化学稳定性和耐热性能。项目生产中塑料粒子的熔融温度不会导致这些塑料粒子的分解，一般情况下不会产生塑料粒子焦炭链焦化气体。注塑成型产生的塑料边角料经破碎后重新回用到生产中，注塑过程会产生注塑废气（非甲烷总烃、臭气浓度）。\
