    - data:
        code: "import json\nimport ast\nimport re\nimport html as html_lib\n\n\ndef\
          \ _strip_code_fence(text: str) -> str:\n    text = (text or \"\").strip()\n\
          \    text = re.sub(r\"^```(?:json)?\\s*\", \"\", text, flags=re.I)\n   \
          \ text = re.sub(r\"\\s*```$\", \"\", text).strip()\n    return text\n\n\n\
          def _parse_input(raw: str):\n    raw = _strip_code_fence(raw)\n    try:\n\
          \        return json.loads(raw)\n    except Exception:\n        try:\n \
          \           return ast.literal_eval(raw)\n        except Exception:\n  \
          \          return raw\n\n\ndef _to_chunks(data):\n    \"\"\"统一转成 [{'id':\
          \ ..., 'content': ...}]，兼容 list / dict / string 输入。\"\"\"\n    if isinstance(data,\
          \ list):\n        chunks = []\n        for i, item in enumerate(data):\n\
          \            if isinstance(item, dict):\n                content = item.get(\"\
          content\") or item.get(\"text\") or json.dumps(item, ensure_ascii=False)\n\
          \                chunks.append({\"id\": str(item.get(\"id\", i)), \"content\"\
          : str(content)})\n            else:\n                chunks.append({\"id\"\
          : str(i), \"content\": str(item)})\n        return chunks\n    if isinstance(data,\
          \ dict):\n        content = data.get(\"content\") or data.get(\"text\")\
          \ or json.dumps(data, ensure_ascii=False)\n        return [{\"id\": str(data.get(\"\
          id\", \"0\")), \"content\": str(content)}]\n    return [{\"id\": \"0\",\
          \ \"content\": str(data)}]\n\n\ndef _clean_html(text: str) -> str:\n   \
          \ text = html_lib.unescape(text or \"\")\n    # 表格结构对本任务不是关键，删除标签可显著压缩 token。\n\
          \    text = re.sub(r\"<[^>]+>\", \" \", text)\n    text = re.sub(r\"\\s+\"\
          , \" \", text).strip()\n    return text\n\n\ndef _merge_windows(windows):\n\
          \    if not windows:\n        return []\n    windows = sorted(windows)\n\
          \    merged = [list(windows[0])]\n    for start, end in windows[1:]:\n \
          \       if start <= merged[-1][1]:\n            merged[-1][1] = max(merged[-1][1],\
          \ end)\n        else:\n            merged.append([start, end])\n    return\
          \ [(s, e) for s, e in merged]\n\n\ndef _extract_investment_windows(text:\
          \ str, radius: int = 800) -> str:\n    keywords = [\n        \"总投资\", \"\
          环保投资\", \"环保投资占比\", \"项目环保投资\", \"环保投资一览表\",\n        \"工程投资\", \"占总投资比例\"\
          , \"防治措施\"\n    ]\n    windows = []\n    for kw in keywords:\n        for\
          \ m in re.finditer(re.escape(kw), text):\n            start = max(0, m.start()\
          \ - radius)\n            end = min(len(text), m.end() + radius)\n      \
          \      windows.append((start, end))\n    windows = _merge_windows(windows)\n\
          \    parts = []\n    for start, end in windows:\n        parts.append(text[start:end])\n\
          \    return \"\\n...\\n\".join(parts)\n\n\ndef main(html: str) -> dict:\n\
          \    raw = html or \"\"\n    data = _parse_input(raw)\n    chunks = _to_chunks(data)\n\
          \n    selected = []\n    for chunk in chunks:\n        text = _clean_html(chunk[\"\
          content\"])\n        # 只保留与“环保投资核算”直接相关的片段，避免整篇报告进入模型。\n        if any(k\
          \ in text for k in [\"总投资\", \"环保投资\", \"环保投资占比\", \"项目环保投资\", \"环保投资一览表\"\
          , \"工程投资\"]):\n            snippet = _extract_investment_windows(text)\n\
          \            if snippet:\n                selected.append(f\"【片段ID：{chunk['id']}】\\\
          n{snippet}\")\n\n    if selected:\n        result = \"\\n\\n\".join(selected)\n\
          \    else:\n        # 兜底：未识别到关键词时，只取开头部分，避免上下文超限。\n        result = _clean_html(raw)[:8000]\n\
          \n    # 二号任务只核算总投资/环保投资/占比，限制长度即可，不需要完整报告。\n    max_chars = 8000\n    if\
          \ len(result) > max_chars:\n        result = result[:max_chars] + \"\\n……（已截断：仅保留环保投资核算相关内容）\"\
          \n\n    return {\n        \"first_json_content\": result\n    }\n"
