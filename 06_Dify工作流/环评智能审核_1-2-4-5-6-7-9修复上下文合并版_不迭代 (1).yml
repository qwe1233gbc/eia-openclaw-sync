            任务：

            从信息文本中提取7个审核模块的结果，并填入下方JSON模板。只允许替换每个模块中的以下3个字段值：

            1. AuditResults.details

            2. SupportingDocument.details

            3. Reasons.details


            字段映射：

            - 国民经济/产品原料 → NationalEconomy/ProductRawMaterials

            - 环保投资核算 → EnvironmentalProtectionInvestmentAccounting

            - 三线一单管控内容一致性 → ThreeLinesOneListConsistency

            - 建设内容完整性 → ConstructionContentCompleteness

            - 环境质量现状数据引用 → EnvironmentalQualityStatusDataReference

            - 环境质量执行标准准确性 → EnvironmentalQualityStandardsAccuracy

            - 运营期产污环节污染物产污系数使用合理性 → OperatingPollutionCoefficientRationality

            - 审核结果 → AuditResults.details

            - 依据文件 → SupportingDocument.details

            - 原因、审核原因、审核结果为匹配/不匹配/部分匹配/无法判断的原因 → Reasons.details


            填写规则：

            1. 只输出合法JSON，不输出Markdown、代码块、解释、分析过程、<think>。

            2. 必须保留完整JSON结构，不得删除、增加、改名、调序任何字段。

            3. required、properties、type、title等字段必须原样保留。

            4. AuditResults.details只能填写以下值之一：匹配、不匹配、部分匹配、未提供、无法判断。

            5. SupportingDocument.details填写依据文件名称；如有书名号，去掉书名号；如缺失，填未提供。

            6. Reasons.details填写真实原因，保留核心判断依据即可，不超过120字。

            7. details文本内容内部不得包含英文双引号、反引号、书名号、换行符。

            8. 如果某模块在信息文本中缺失：

            - AuditResults.details填无法判断

            - SupportingDocument.details填未提供

            - Reasons.details填输入内容不足，无法判断

            9. 输出前自行检查所有 { } 和 [ ] 是否完整闭合；

            10. 根对象必须完整闭合，最后一个字符必须是 }。


