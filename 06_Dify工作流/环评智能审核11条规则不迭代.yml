          text: "调查文本：{{#context#}}\n\n你是归纳总结专家，请你对以上提供的文本进行分析，按照以下四部分要求提取并整理信息：\n\
            \n1. 核心模块：提取核心模块的名称；\n2. 审核结果：仅从以下结果中选择其一填写——符合、不符合；\n3. 依据文件：审核结果依据的国标、技术指南、地方准入清单、产排污系数手册等规范性文件；\n\
            4. 审核结果为不符合的原因：只提炼存在的问题；若符合，则简要说明符合依据。\n\n判断口径：\n- 原审核结果为“匹配”“核算正确”“内容齐全”“一致”“合理”“准确”的，统一输出“符合”；\n\
            - 原审核结果为“不匹配”“部分匹配”“无法判断”“未提供”“信息不完整”“依据不足”“无法核算”的，统一输出“不符合”；\n- 若调查文本中没有明确结论，审核结果填“不符合”，原因写“调查文本未提供足够信息”；\n\
            - 若存在部分问题，即使也有符合内容，也输出“不符合”，原因只陈述存在的问题；\n- 不要输出“部分匹配”“无法判断”“匹配”“不匹配”等旧口径词。\n\
            \n请按照核心模块顺序输出，一共11条：\n1. 国民经济/产品原料\n2. 环保投资核算\n3. 三线一单管控内容一致性\n4. 建设内容完整性\n\
            5. 环境质量现状数据引用\n6. 环境质量执行标准准确性\n7. 运营期产污环节污染物产污系数使用合理性\n8. 运营期间产污环节污染物产污系数使用合理性判定\n\
            9. 废气收集形式及排气量计算合理性\n10. 废气收集风量与设计风量准确性核算\n11. 废气收集效率判定准确性\n\n输出模板：\n[\n\
            \  {\"审核模块\":\"国民经济/产品原料\",\"审核结果\":\"xx\",\"依据文件\":\"xx\",\"原因\":\"xx\"\
            },\n  {\"审核模块\":\"环保投资核算\",\"审核结果\":\"xx\",\"依据文件\":\"xx\",\"原因\":\"xx\"\
            },\n  {\"审核模块\":\"三线一单管控内容一致性\",\"审核结果\":\"xx\",\"依据文件\":\"xx\",\"原因\"\
