index_path: outputs/chen2026_hybrid_index/eia_plastic_hybrid.sqlite

embedding:
  mode: hash
  dimensions: 384
  openai_model: text-embedding-3-small

chunking:
  chunk_chars: 1200
  overlap_chars: 180

sources:
  - name: standard_library
    root: 03_指南解析_明文标准库
    glob:
      - "**/*.md"
      - "**/*.txt"
      - "**/*.csv"
      - "**/*.json"
      - "**/*.jsonl"
    evidence_type: standard
  - name: qa_tasks
    root: 05_QA测试集
    glob:
      - "**/*.xlsx"
      - "**/*.csv"
      - "**/*.jsonl"
    evidence_type: qa_task
  - name: experiment_design
    root: 10_消融实验设计
    glob:
      - "**/*.md"
      - "**/*.csv"
      - "**/*.yaml"
    evidence_type: experiment_design
  - name: audit_skills
    root: 09_环评审核技能库
    glob:
      - "**/*.md"
      - "**/*.json"
      - "**/*.yaml"
    evidence_type: audit_skill
