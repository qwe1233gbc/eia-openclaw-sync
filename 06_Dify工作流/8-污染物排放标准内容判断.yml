      \ 材料名称 </p> </td> <td> <p> 主要成份及其理化性质 </p> </td> </tr> <tr> <td> <p> PBT 塑料\
      \ </p> </td> <td> <p> 聚对苯二甲酸丁二醇酯（ PBT ）是 <a> 对苯二甲酸 </a> 和 <a> 1,4- </a> 丁二醇\
      \ 缩聚制成的聚酯，是重要的 <a> 热塑性聚酯 </a> ，五大 <a> 工程塑料 </a> 之一， PBT 为乳白色 <a> 半透明 </a> 到\
      \ <a> 不透明 </a> 、半结晶型热塑性聚酯，具有高 <a> 耐热性 </a> 。不耐 <a> 强酸 </a> 、强碱，能耐 <a> 有机溶剂 </a>\
      \ ，可燃，高温下分解，吸水性小，具有优良的结晶性工程塑料，刚性和硬度高。在汽车、 <a> 机械设备 </a> 、精密仪器部件、 <a> 电子电器 </a>\
      \ 、纺织等领域得到广泛的应用。熔点： 233℃ ，密度为 1.3-1.38g/cm <sup> 3 </sup> ，热分解温度在 280℃ 。 </p>\
      \ </td> </tr> <tr> <td> <p> PP 塑料 </p> </td> <td> <p> 聚丙烯通常为半透明固体，无臭，无味，无毒，相对密度为\
      \ 0.90 ～ 0.91g /cm <sup> 3 </sup> ，是通用塑料中最轻的一种。由于结构规整，因而熔点高达 167℃ ，耐热，连续使用温度可达\
      \ 110 ～ 120℃ ，在外力作用下， 150℃ 不变形；耐腐蚀，电绝缘性能好。透明性、刚性和强度均比聚乙烯好。但耐老化、耐低温冲击性能差。热分解温度为\
      \ &gt;340℃ 。 </p> </td> </tr> <tr> <td> <p> PA6 塑料 </p> </td> <td> <p> 品名为 PA6\
      \ 尼龙塑料聚酰胺 6 或尼龙 6 ，分子式是 [-NH- （ <a> CH2 </a> ） 5 － CO]n －，半透明或 <a> 不透明 </a>\
      \ 乳白色结晶形聚合物， <a> 热塑性 </a> 、轻质、韧性好、耐化学品和 <a> 耐久性 </a> 好， PA6 尼龙塑料 <a> 工业生产 </a>\
      \ 中泛用于制造轴承、圆 <a> 齿轮 </a> 、 <a> 凸轮 </a> 、 <a> 伞齿轮 </a> 、各种滚子、 <a> 滑轮 </a> 、泵叶轮等，其密度：\
      \ 1.13g/cm <sup> 3 </sup> ，闪点：＞ 400℃ ，熔化温度： 230~280℃ ，热分解温度为 &gt;300℃ 。 </p>\
      \ </td> </tr> <tr> <td> <p> 色粉 </p> </td> <td> <p> 一种有颜色的粉末物质 , 与塑胶混合后，经加热注塑制成各种不同颜色的塑胶产品。它广泛应用于塑胶着色工艺中。\
      \ </p> </td> </tr> <tr> <td> <p> 液压油 </p> </td> <td> <p> 液压油就是利用液体压力能的液压系统使用的液压介质，在液压系统中起着能量传递、抗磨、系统润滑、防腐、防锈、冷却等作用。其具有适宜的粘度及良好的粘温性能，以确保在工作温度发生变化的条件下能准确、灵敏地传递动力，并能保证液压元件的正常润滑。具有良好的防锈性及抗氧化安定性，在高温高压条件下不易氧化变质，使用寿命长。具有良好的抗泡沫性，使油品在受机械不断搅拌的工作条件下，产生的泡沫易于消失以使动力传递稳定，避免液压油的加速氧化。\
      \ </p> </td> </tr> <tr> <td> <p> 机油 </p> </td> <td> <p> 机油由基础油和添加剂两部分组成。基础油是润滑油的主要成分，决定着润滑油的基本性质，添加剂则可弥补和改善基础油性能方面的不足，赋予某些新的性能，是润滑油的重要组成部分。\
      \ </p> </td> </tr> </table> <ol> <li> <p> 公用工程 </p> </li> </ol> <p> （ 1 ）供电：项目用电主要由市政电网供给，新增用电量为\
