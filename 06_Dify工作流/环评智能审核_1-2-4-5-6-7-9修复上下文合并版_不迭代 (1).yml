          \ 对象。\n    防止模型在 JSON 前后输出解释性文字。\n    \"\"\"\n    start = text.find(\"{\"\
          )\n    if start == -1:\n        return text.strip()\n\n    end = text.rfind(\"\
          }\")\n    if end == -1 or end < start:\n        return text[start:].strip()\n\
          \n    return text[start:end + 1].strip()\n\n\ndef _balance_json_braces(text:\
          \ str) -> str:\n    \"\"\"\n    自动补齐缺失的右括号。\n    支持补齐：\n    1. {}\n    2.\
          \ []\n    会避开字符串内部的括号。\n    \"\"\"\n    stack = []\n    in_str = False\n\
          \    esc = False\n\n    for ch in text:\n        if esc:\n            esc\
          \ = False\n            continue\n\n        if ch == \"\\\\\" and in_str:\n\
