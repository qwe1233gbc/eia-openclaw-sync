          \ != -1 and end != -1 and end > start:\n        text = text[start:end+1]\n\
          \    try:\n        return json.loads(text)\n    except Exception:\n    \
          \    return {}\n\ndef main(extracted: str) -> dict:\n    obj = _extract_json(extracted)\n\
          \    control_unit = obj.get(\"环境管控单元\") or obj.get(\"环境管控单元名称和编码\") or obj.get(\"\
          control_unit\") or \"未提供\"\n    docs_name = obj.get(\"准入清单名称\") or obj.get(\"\
          docs_name\") or \"广东省佛山市/项目所在地环境管控单元准入清单\"\n    sections = []\n    for key\
          \ in [\"区域布局管控\", \"能源资源利用\", \"污染物排放管控\", \"环境风险防控\"]:\n        val = obj.get(key)\
          \ or \"未提供\"\n        sections.append(f\"【{key}】{val}\")\n    eia_content\
          \ = f\"环境管控单元：{control_unit}\\n准入清单名称：{docs_name}\\n\" + \"\\n\".join(sections)\n\
