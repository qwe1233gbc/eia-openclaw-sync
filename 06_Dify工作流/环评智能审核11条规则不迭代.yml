    - data:
        code: "import json\nimport re\n\ndef _strip_noise(text: str) -> str:\n   \
          \ \"\"\"\n    清理大模型输出中的干扰内容：\n    1. 去掉 <think>...</think>\n    2. 去掉 markdown\
          \ 代码块\n    3. 去掉首尾空白\n    \"\"\"\n    text = (text or \"\").strip()\n\n\
          \    # 去除完整 think 块\n    text = re.sub(r\"<think>.*?</think>\", \"\", text,\
          \ flags=re.S)\n\n    # 兼容残留 think 标签\n    text = text.replace(\"<think>\"\
          , \"\").replace(\"</think>\", \"\")\n\n    # 去除 markdown json 代码块标记\n  \
          \  text = re.sub(r\"^```(?:json)?\\s*\", \"\", text, flags=re.I)\n    text\
          \ = re.sub(r\"\\s*```$\", \"\", text)\n\n    return text.strip()\n\n\ndef\
          \ _extract_json_object(text: str) -> str:\n    \"\"\"\n    从模型输出中提取第一个 JSON\
          \ 对象。\n    防止模型在 JSON 前后输出解释性文字。\n    \"\"\"\n    start = text.find(\"{\"\
          )\n    if start == -1:\n        return text.strip()\n\n    end = text.rfind(\"\
          }\")\n    if end == -1 or end < start:\n        return text[start:].strip()\n\
          \n    return text[start:end + 1].strip()\n\n\ndef _balance_json_braces(text:\
          \ str) -> str:\n    \"\"\"\n    自动补齐缺失的右括号。\n    支持补齐：\n    1. {}\n    2.\
          \ []\n    会避开字符串内部的括号。\n    \"\"\"\n    stack = []\n    in_str = False\n\
          \    esc = False\n\n    for ch in text:\n        if esc:\n            esc\
          \ = False\n            continue\n\n        if ch == \"\\\\\" and in_str:\n\
          \            esc = True\n            continue\n\n        if ch == '\"':\n\
          \            in_str = not in_str\n            continue\n\n        if in_str:\n\
          \            continue\n\n        if ch in \"{[\":\n            stack.append(ch)\n\
          \n        elif ch in \"}]\":\n            if stack:\n                top\
          \ = stack[-1]\n                if (top == \"{\" and ch == \"}\") or (top\
          \ == \"[\" and ch == \"]\"):\n                    stack.pop()\n\n    closing\
          \ = \"\"\n    while stack:\n        top = stack.pop()\n        closing +=\
          \ \"}\" if top == \"{\" else \"]\"\n\n    return text + closing\n\n\ndef\
          \ main(json_str: str) -> dict:\n    \"\"\"\n    Dify 代码节点入口。\n    输入：json_str，来自\
          \ LLM 2 的输出。\n    输出：result，返回清洗和修复后的合法 JSON 字符串。\n    \"\"\"\n    text\
          \ = _strip_noise(json_str)\n    text = _extract_json_object(text)\n    text\
          \ = _balance_json_braces(text)\n\n    try:\n        obj = json.loads(text)\n\
          \        text = json.dumps(obj, ensure_ascii=False, separators=(\",\", \"\
          :\"))\n    except Exception:\n        # 如果仍然解析失败，至少返回去除换行后的文本，便于日志排查\n \
          \       text = text.replace(\"\\n\", \"\").strip()\n\n    return {\n   \
          \     \"result\": text\n    }"
