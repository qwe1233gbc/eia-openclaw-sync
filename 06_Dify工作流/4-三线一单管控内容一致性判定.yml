    - data:
        code: "import json\nimport re\n\ndef _clean(text: str) -> str:\n    text =\
          \ (text or \"\").strip()\n    text = re.sub(r\"<think>.*?</think>\", \"\"\
          , text, flags=re.S)\n    text = re.sub(r\"^```(?:json)?\\s*\", \"\", text,\
          \ flags=re.I)\n    text = re.sub(r\"\\s*```$\", \"\", text).strip()\n  \
          \  return text\n\ndef _extract_json(text: str):\n    text = _clean(text)\n\
