      \ </p> <p> ① 企业应做好环境教育和技术培训，提高员工的环保意识和技术水平，对员工定期进行环保培训，提高全员的安全和环境保护意识。 </p>\
      \ <p> ② 建设污染治理设施的管理、运行环境管理记录制度。建立健全岗位责任制，制定正确的操作规程、建立管理台帐，制定环境保护工作的长期规划。 </p>\
      \ <p> ③ 必须确保污染治理设施长期、稳定、有效地运行，不得擅自拆除或者闲置污染治理设施，不得故意不正常使用污染治理设施。定期对污染物处理排放设备进行维修、保养，严格控制污染物的排放。\
      \ </p> <p> 2 、排污口及环保图形标识规范设置 </p> <p> 各污染排放口应按规范实施，遵守《国家环境保护总局办公厅关于印发排放口标志牌技术规格的通知》（环办\
      \ [2003] 第 95 号）相关规定。明确采样口位置，设立环保图形标志、废气污染治理设施进出口均设置采样孔及采样平台；废水处理设施出口应设置采样点；一般工业固体废物暂存区及危废仓设置环保图形标志；设置噪声相关环保图形标志。\
      \ </p> <p> 3 、排污许可证制度执行要求 </p> <p> 项目 属于 C2929 塑料零件及其他塑料制品制造，根据《固定污染源排污许可分类管理名录（\
      \ 2019 年版）》（部令第 11 号），项目属于“二十四、橡胶和塑料制品业 -62 塑料制品业 - 其他”，应实行排污许可登记管理；建设单位应在全国排污许可证管理信息平台进行排污登记申请，填写基本信息、污染物排放去向、执行的污染物排放标准以及采取的污染防治措施等信息。\
      \ </p> <p> 4 、竣工验收 </p> <p> 项目竣工后，建设单位应按环保部规定的标准和程序验收环保设施，自行委托有资质的环境监测单位进行验收监测，编写自主验收监测报告，并向社会公开，验收合格后方可投产使用，同时项目环保措施落实情况受环保主管部门监督检查。\
      \ </p> <p> 5 、管理文件 </p> <p> 记录废气运行设施台账、危废及一般工业固废台账；对于活性炭吸附装置运行与维护的管理：应做好活性炭吸附装置运行状况、设施维护、活性炭更换记录，建立管理台账，相关记录至少保存三年，现场保留不少于一个月的台账记录。主要记录内容包括：\
      \ a ）活性炭吸附装置的启动、停止时间； b ）活性炭的质量分析数据、采购量、使用量、更换量与更换时间。 c ）活性炭吸附装置运行工艺控制参数，至少包括设备进、出口浓度和吸附装置内温度；\
      \ d ）主要设备维修情况，运行事故及维修情况； e ）定期检验、评价及评估情况。维护人员应根据计划定期检查、维护和更换必要的部件和材料，保障活性炭在低颗粒物、低含水率条件下使用。\
      \ </p> <p> 制定环境管理制度，提高员工环保意识，加强日常维护，落实污染物达标排放监督与考核。 </p>                   \
      \                        </td> </tr> </table> <p> 六、结论 </p> <table> <tr> <td>\
      \ <p> 佛山市盛之强电器有限公司建设项目，选址于佛山市顺德区大良街道古鉴村良勒路 245 号首层之一，其建设符合国家产业政策，符合区域规划要求，选址合理可行，符合“三线一单”管控要求。项目建设具有良好的社会与经济效益，将促进当地的经济发展。各污染物经处理后均可做到达标排放，并符合总量控制要求。项目区域环境容量满足项目建设的需要，应严格执行我国建设项目环境保护“三同时制度”。\
      \ </p> <p> 从环境保护角度出发，该项目的建设是可行的。 </p> </td> </tr> </table> <p> 附表 </p> <p> 建设项目污染物排放量汇总表\
