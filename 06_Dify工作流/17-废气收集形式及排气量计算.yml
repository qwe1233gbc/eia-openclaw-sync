    - data:
        code: "import json\nimport ast\nimport re\nimport html as html_lib\n\nKEYWORDS = [('废气收集|集气罩|密闭集气罩|局部密闭|点对点', 32),\
          \ ('排气量|风量|废气量|处理能力|设计风量|收集风量', 32), ('控制风速|罩口风速|面风速|风速', 28), ('罩口面积|集气罩面积|开口面积|操作口面积', 24), ('注塑废气|有机废气|VOCs|非甲烷总烃|臭气浓度',\
          \ 26), ('投料粉尘|破碎粉尘|金属粉尘|颗粒物', 18), ('排气筒|DA001|废气排放口|出口内径|烟气流速', 22), ('活性炭吸附|治理设施|处理工艺', 16), ('广东省涉挥发性有机物.*治理指引|重点行业挥发性有机物综合治理方案|佛山市塑胶行业',\
          \ 24)]\nSECTION_STARTS = ['运营期', '营运期', '废气', '主要环境影响和保护措施', '环保工程', '污染物排放控制标准']\nSECTION_ENDS = ['废水自行监测计划', '声环境',\
          \ '固体废物', '环境保护措施监督检查清单', '五[、.．]\\\\s*环境保护措施', '六[、.．]', '结论']\nMAX_LEN = 50000\n\n\ndef _strip_code_fence(text:\
          \ str) -> str:\n    text = (text or \"\").strip()\n    text = re.sub(r\"^```(?:json)?\\s*\", \"\", text, flags=re.I)\n\
          \    text = re.sub(r\"\\s*```$\", \"\", text).strip()\n    return text\n\n\ndef _parse_input(raw: str):\n    raw\
          \ = _strip_code_fence(raw)\n    try:\n        return json.loads(raw)\n    except Exception:\n        try:\n    \
          \        return ast.literal_eval(raw)\n        except Exception:\n            return raw\n\n\ndef _to_chunks(data):\n\
          \    chunks = []\n    if isinstance(data, list):\n        for i, item in enumerate(data):\n            if isinstance(item,\
          \ dict):\n                content = item.get(\"content\") or item.get(\"text\") or item.get(\"markdown\") or item.get(\"\
          html\") or json.dumps(item, ensure_ascii=False)\n                title = item.get(\"title\") or item.get(\"path\"\
          ) or item.get(\"heading\") or \"\"\n                chunks.append({\"id\": str(item.get(\"id\", i)), \"title\":\
          \ str(title), \"content\": str(content), \"order\": i})\n            else:\n                chunks.append({\"id\"\
          : str(i), \"title\": \"\", \"content\": str(item), \"order\": i})\n        return chunks\n    if isinstance(data,\
          \ dict):\n        content = data.get(\"content\") or data.get(\"text\") or data.get(\"markdown\") or data.get(\"\
          html\") or json.dumps(data, ensure_ascii=False)\n        title = data.get(\"title\") or data.get(\"path\") or data.get(\"\
          heading\") or \"\"\n        return [{\"id\": str(data.get(\"id\", \"0\")), \"title\": str(title), \"content\": str(content),\
          \ \"order\": 0}]\n    return [{\"id\": \"0\", \"title\": \"\", \"content\": str(data), \"order\": 0}]\n\n\ndef _clean_html(text:\
          \ str) -> str:\n    text = html_lib.unescape(text or \"\")\n    replacements = [\n        (r\"</tr\\s*>\", \"\\\
          n\"),\n        (r\"</td\\s*>\", \" | \"),\n        (r\"</th\\s*>\", \" | \"),\n        (r\"</p\\s*>\", \"\\n\"),\n\
          \        (r\"<br\\s*/?>\", \"\\n\"),\n        (r\"</li\\s*>\", \"\\n\"),\n        (r\"</h[1-6]\\s*>\", \"\\n\"),\n\
          \    ]\n    for pattern, repl in replacements:\n        text = re.sub(pattern, repl, text, flags=re.I)\n    text\
          \ = re.sub(r\"<[^>]+>\", \" \", text)\n    text = re.sub(r\"[ \\t\\r\\f\\v]+\", \" \", text)\n    text = re.sub(r\"\
          \\n\\s*\\n+\", \"\\n\", text)\n    return text.strip()\n\n\ndef _score(text: str) -> int:\n    score = 0\n    for\
          \ kw, weight in KEYWORDS:\n        if re.search(kw, text, flags=re.I):\n            score += int(weight)\n    return\
          \ score\n\n\ndef _cut_by_section(text: str) -> str:\n    start = None\n    for pat in SECTION_STARTS:\n        m\
          \ = re.search(pat, text, flags=re.I)\n        if m:\n            start = m.start()\n            break\n    if start\
          \ is None:\n        return text\n    end = len(text)\n    for pat in SECTION_ENDS:\n        m = re.search(pat, text[start\
          \ + 50:], flags=re.I)\n        if m:\n            end = start + 50 + m.start()\n            break\n    return text[start:end]\n\
          \n\ndef _merge_windows(windows):\n    if not windows:\n        return []\n    windows = sorted(windows)\n    merged\
          \ = [list(windows[0])]\n    for s, e in windows[1:]:\n        if s <= merged[-1][1] + 500:\n            merged[-1][1]\
          \ = max(merged[-1][1], e)\n        else:\n            merged.append([s, e])\n    return [(s, e) for s, e in merged]\n\
          \n\ndef _extract_keyword_windows(text: str, radius: int = 1900) -> str:\n    windows = []\n    for kw, _ in KEYWORDS:\n\
          \        for m in re.finditer(kw, text, flags=re.I):\n            windows.append((max(0, m.start() - radius), min(len(text),\
          \ m.end() + radius)))\n    parts = []\n    for s, e in _merge_windows(windows):\n        frag = text[s:e].strip()\n\
          \        if frag:\n            parts.append(frag)\n    return \"\\n\\n---候选片段---\\n\\n\".join(parts)\n\n\ndef main(html_str:\
          \ str) -> dict:\n    raw = html_str or \"\"\n    data = _parse_input(raw)\n    chunks = _to_chunks(data)\n    cleaned_chunks\
          \ = []\n    for c in chunks:\n        text = _clean_html(c.get(\"content\", \"\"))\n        title = _clean_html(c.get(\"\
          title\", \"\"))\n        score = _score(title + \"\\n\" + text)\n        cleaned_chunks.append({\"id\": c.get(\"\
          id\"), \"title\": title, \"content\": text, \"score\": score, \"order\": c.get(\"order\", 0)})\n\n    selected =\
          \ [c for c in cleaned_chunks if c[\"score\"] > 0]\n    selected = sorted(selected, key=lambda x: (-x[\"score\"],\
          \ x[\"order\"]))[:20]\n    text = \"\\n\\n\".join([f\"【片段{c['id']}】{c['title']}\\n{c['content']}\" for c in selected])\n\
          \n    if not text:\n        full = _clean_html(raw)\n        text = _extract_keyword_windows(full)\n    else:\n\
          \        win = _extract_keyword_windows(text)\n        if win:\n            text = win\n\n    if not text:\n   \
          \     text = \"未筛选到明确相关内容，请基于输入不足输出无法判断。\"\n    if len(text) > MAX_LEN:\n        text = text[:MAX_LEN] + \"\\n……（已按相关性截断）\"\
          \n    return {\"result\": text}\n"
        code_language: python3
