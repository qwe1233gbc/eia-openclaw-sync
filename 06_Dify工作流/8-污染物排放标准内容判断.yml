      \ </li> </ol> <p> 项目生活污水经三级化粪池处理后各类污染物的排放浓度均可达到 广东省地方标准《水污染物排放限值》（ DB44/26-2001\
      \ ）的第二时段三级标准（ pH ： 6-9 （无量纲）、 COD <sub> Cr </sub> ： 500mg/L 、 BOD <sub> 5 </sub>\
      \ ： 300mg/L 、 SS ： 400mg/L ），然后通过工业区市政污水管网纳入大门污水处理厂处理，尾水 执行 广东省地方标准《水污染物排放限值》\
      \ （ DB44/26-2001 ） “城镇二级污水处理厂”第二时段一级标准和《城镇污水处理厂污染物排放标准》（ GB18918-2002 ）一级 A\
      \ 标准这两者中的较严值，最终排入顺德支流。 </p> <ol> <li> <p> 废水治理设施可行性分析 </p> </li> </ol> <p> 生活污水主要治理设施为三级化粪池。粪便废水中含有大量粪便、纸屑、病原虫等，化粪池是一种利用沉淀和厌氧发酵的原理，去除生活污水中悬浮性有机物的处理设施，属于初级的过渡性生活处理构筑物，污水在进入化粪池时，细菌会对污物进行无氧分解，并会使固体废物体积减少，再经过沉淀后排出，水质污染程度就会降低。项目生活污水水质简单，污染物浓度较低，故采用三级化粪池处理后可达到\
      \ 广东省地方标准《水污染物排放限值》（ DB44/26-2001 ）的第二时段三级标准 ，项目生活污水治理设施可行。 </p> <ol> <li> <p>\
      \ 生活污水依托大门污水处理厂处理的环境可行性分析 </p> </li> </ol> <p> 顺德大门污水处理厂由佛山市顺德区华清源环保有限公司投资建设，其纳污范围为云近东地区、\
      \ 105 国道以北区域与 105 国道以南区域三个片区和红岗片区、凤翔片区，本项目位于大门污水处理厂的纳污范围内，且已接通市政管网。 </p> <p>\
      \ 大门污水处理厂现已建成规模一期二期 6 万 t/d ，三期 5 万 t/d ，已投入运行并完成提标改造工程验收，污水处理工艺为粗格栅 + 细格栅 +CASS\
      \ （或 + 氧化沟 + 二沉池） + 精细格栅 + 连续流砂滤池 + 紫外消毒工艺，这是近年来国际公认的处理生活污水及工业废水的先进工艺，污水能够稳定达标排放。大门污水处理厂出水水质可满足《城镇污水处理厂污染物排放标准》（\
      \ GB18918-2002 ）一级 A 标准和广东省地标《水污染物排放限值》（ DB44/26-2001 ）第二时段一级标准的较严值要求，经处理达标后的尾水排入顺德支流。\
      \ </p> <p> 项目外排废水主要为生活污水，其 排放量远远低于现有的处理规模，不会对 大门 污水处理厂的处理规模造成冲击 。 </p> <p> 因此，项目经预处理达标的生活污水依托大门污水处理厂处理是可行的。\
      \ </p> <p> 5 、废水自行监测计划 </p> <p> 项目生活污水经市政污水管道排入大门污水处理厂处理，根据《排污单位自行监测技术指南 橡胶和塑料制品》（\
      \ HJ1207-2021 ）表 2 非重点排污单位间接排放的相关规定，生活污水无需开展自行监测。 </p> </td> </tr> </table>\
