    - data:
        code: "import json\nimport ast\nimport re\nimport html as html_lib\n\nKEYWORDS\
          \ = [\n    ('产污系数', 30), ('产污环节', 28), ('污染物', 26), ('源强核算', 25),\n    ('产生量',\
          \ 24), ('产排污系数', 28), ('系数手册', 28), ('排放源统计调查产排污核算方法和系数手册', 32),\n    ('产污系数表',\
          \ 28), ('单位产品污染物', 22), ('kg/t原料', 20), ('g/t产品', 20),\n    ('核算公式', 26),\
          \ ('产生速率', 20), ('年产生量', 22)\n]\nSECTION_STARTS = ['产污环节', '污染物产污系数', '产污系数',\
          \ '源强核算', '废气源强分析', '废水源强分析']\nSECTION_ENDS = ['污染物排放标准', '总量控制', '废气收集',\
          \ '废水治理', '环境影响分析']\nMAX_LEN = 16000\n\ndef _strip_code_fence(text: str)\
          \ -> str:\n    text = (text or \"\").strip()\n    text = re.sub(r\"^```(?:json)?\\\
          s*\", \"\", text, flags=re.I)\n    text = re.sub(r\"\\s*```$\", \"\", text).strip()\n\
          \    return text\n\ndef _parse_input(raw: str):\n    raw = _strip_code_fence(raw)\n\
          \    try:\n        return json.loads(raw)\n    except Exception:\n     \
          \   try:\n            return ast.literal_eval(raw)\n        except Exception:\n\
          \            return raw\n\ndef _to_chunks(data):\n    chunks = []\n    if\
          \ isinstance(data, list):\n        for i, item in enumerate(data):\n   \
          \         if isinstance(item, dict):\n                content = item.get(\"\
          content\") or item.get(\"text\") or item.get(\"markdown\") or item.get(\"\
          html\") or json.dumps(item, ensure_ascii=False)\n                title =\
          \ item.get(\"title\") or item.get(\"path\") or item.get(\"heading\") or\
          \ \"\"\n                chunks.append({\"id\": str(item.get(\"id\", i)),\
          \ \"title\": str(title), \"content\": str(content), \"order\": i})\n   \
          \         else:\n                chunks.append({\"id\": str(i), \"title\"\
          : \"\", \"content\": str(item), \"order\": i})\n        return chunks\n\
          \    if isinstance(data, dict):\n        content = data.get(\"content\"\
          ) or data.get(\"text\") or data.get(\"markdown\") or data.get(\"html\")\
          \ or json.dumps(data, ensure_ascii=False)\n        title = data.get(\"title\"\
          ) or data.get(\"path\") or data.get(\"heading\") or \"\"\n        return\
          \ [{\"id\": str(data.get(\"id\", \"0\")), \"title\": str(title), \"content\"\
          : str(content), \"order\": 0}]\n    return [{\"id\": \"0\", \"title\": \"\
          \", \"content\": str(data), \"order\": 0}]\n\ndef _clean_html(text: str)\
          \ -> str:\n    text = html_lib.unescape(text or \"\")\n    replacements\
          \ = [\n        (r\"</tr\\s*>\", \"\\n\"),\n        (r\"</td\\s*>\", \" |\
          \ \"),\n        (r\"</th\\s*>\", \" | \"),\n        (r\"</p\\s*>\", \"\\\
          n\"),\n        (r\"<br\\s*/?>\", \"\\n\"),\n        (r\"</li\\s*>\", \"\\\
          n\"),\n        (r\"</h[1-6]\\s*>\", \"\\n\"),\n    ]\n    for pattern, repl\
          \ in replacements:\n        text = re.sub(pattern, repl, text, flags=re.I)\n\
          \    text = re.sub(r\"<[^>]+>\", \" \", text)\n    text = re.sub(r\"[ \\\
          t\\r\\f\\v]+\", \" \", text)\n    text = re.sub(r\"\\n\\s*\\n+\", \"\\n\"\
          , text)\n    return text.strip()\n\ndef _score(text: str) -> int:\n    score\
          \ = 0\n    for kw, weight in KEYWORDS:\n        if re.search(kw, text, flags=re.I):\n\
          \            score += int(weight)\n    return score\n\ndef _cut_by_section(text:\
          \ str) -> str:\n    if not SECTION_STARTS:\n        return text\n    start\
          \ = None\n    for pat in SECTION_STARTS:\n        m = re.search(pat, text,\
          \ flags=re.I)\n        if m:\n            start = m.start()\n          \
          \  break\n    if start is None:\n        return text\n    end = len(text)\n\
          \    for pat in SECTION_ENDS:\n        m = re.search(pat, text[start + 50:],\
          \ flags=re.I)\n        if m:\n            end = start + 50 + m.start()\n\
          \            break\n    return text[start:end]\n\ndef _merge_windows(windows):\n\
          \    if not windows:\n        return []\n    windows = sorted(windows)\n\
          \    merged = [list(windows[0])]\n    for s, e in windows[1:]:\n       \
          \ if s <= merged[-1][1] + 400:\n            merged[-1][1] = max(merged[-1][1],\
          \ e)\n        else:\n            merged.append([s, e])\n    return [(s,\
          \ e) for s, e in merged]\n\ndef _extract_keyword_windows(text: str, radius:\
          \ int = 1600) -> str:\n    windows = []\n    for kw, _ in KEYWORDS:\n  \
          \      for m in re.finditer(kw, text, flags=re.I):\n            windows.append((max(0,\
          \ m.start() - radius), min(len(text), m.end() + radius)))\n    parts = []\n\
          \    for s, e in _merge_windows(windows):\n        frag = text[s:e].strip()\n\
          \        if frag:\n            parts.append(frag)\n    return \"\\n\\n---候选片段---\\\
          n\\n\".join(parts)\n\ndef main(html_str: str) -> dict:\n    raw = html_str\
          \ or \"\"\n    data = _parse_input(raw)\n    chunks = _to_chunks(data)\n\
          \    cleaned_chunks = []\n    for c in chunks:\n        text = _clean_html(c.get(\"\
          content\", \"\"))\n        title = _clean_html(c.get(\"title\", \"\"))\n\
          \        score = _score(title + \"\\n\" + text)\n        cleaned_chunks.append({\"\
          id\": c.get(\"id\"), \"title\": title, \"content\": text, \"score\": score,\
          \ \"order\": c.get(\"order\", 0)})\n\n    selected = [c for c in cleaned_chunks\
          \ if c[\"score\"] > 0]\n    selected = sorted(selected, key=lambda x: (-x[\"\
          score\"], x[\"order\"]))[:16]\n    text = \"\\n\\n\".join([f\"【片段{c['id']}】{c['title']}\\\
          n{c['content']}\" for c in selected])\n\n    if not text:\n        full\
          \ = _clean_html(raw)\n        full = _cut_by_section(full)\n        text\
          \ = _extract_keyword_windows(full)\n    else:\n        text = _cut_by_section(text)\n\
          \        win = _extract_keyword_windows(text)\n        if win:\n       \
          \     text = win\n\n    if not text:\n        text = \"未筛选到明确的产污系数或源强核算相关内容，请基于输入不足输出无法判断。\"\
          \n    if len(text) > MAX_LEN:\n        text = text[:MAX_LEN] + \"\\n……（已按相关性截断）\"\
          \n    return {\"result\": text}\n"
        code_language: python3
